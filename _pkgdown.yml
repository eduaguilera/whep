reference:
- title: Build datasets
  desc: >
    Build full datasets from raw FAOSTAT inputs. These functions
    orchestrate reading, gap-filling, historical extension,
    and balance validation.
  contents:
  - build_primary_production
  - build_commodity_balances
  - build_processing_coefs
  - build_detailed_trade
  - build_trade_prices
  - build_primary_prices
  - build_cbs_prices

- title: Spatialization
  desc: >
    Disaggregate country-level agricultural data to a 0.5-degree
    grid. `run_spatialize()` wraps `build_gridded_landuse()` with
    named presets (LPJmL-faithful vs full WHEP) for direct
    cross-model comparison.
  contents:
  - run_spatialize
  - build_gridded_landuse
  - build_gridded_livestock

- title: Constant-territory back-casting
  desc: >
    Rebuild historical series onto a fixed reference-year's boundaries by
    dasymetric spatial reallocation, optionally weighted by LPJmL/WHEP
    gridded covariates.
  contents:
  - build_constant_territory_series
  - make_lpjml_covariate

- title: LPJmL grass availability
  desc: >
    Read managed-grassland net primary production from a finished LPJmL run
    into grazable above-ground dry-matter availability, the forage supply
    ceiling for feed allocation.
  contents:
  - build_grass_availability
  - build_grass_availability_lpjml
  - grass_access_shares
  - aggregate_grass_to_polity
  - read_lpjml_grass_productivity

- title: Soil balances - water
  desc: >
    Read LPJmL hydrology outputs (drainage, evapotranspiration components,
    precipitation, irrigation, runoff, discharge, soil water content and the
    per-crop net irrigation requirement) into tidy long form, close the gridded
    soil water balance exposing the footprint-relevant terms (precipitation,
    applied irrigation, blue and green consumptive water, net irrigation
    requirement), and assemble the monthly climate drivers for the
    soil-organic-carbon dynamics.
  contents:
  - read_lpjml_hydrology
  - build_water_balance
  - get_soc_climate_drivers

- title: Soil-balance coefficient tables
  desc: >
    Structural parameter tables for the soil-organic-carbon turnover models
    (HSOC, RothC, ICBM, AMG, Century), the AMG humification coefficient by
    carbon input type, the soil carbon-to-nitrogen ratios used to convert
    soil-carbon change into net nitrogen mineralization or sequestration, and
    the per-input-type humification fractions for the HSOC model.
  contents:
  - soc_turnover_params
  - amg_h_by_input_type
  - soil_cn_ratios
  - residue_humification

- title: Soil balances - carbon (SOC climate)
  desc: >
    Per-model native climate rate-modifying functions for the soil-organic-carbon
    turnover models. Each model carries its own published temperature and moisture
    response (RothC/HSOC a*b*c, ICBM re_clim, AMGv2 f(T)*f(H), Century DEFAC),
    not a shared scalar.
  contents:
  - soc_rate_modifier_rothc
  - soc_rate_modifier_icbm
  - soc_rate_modifier_amg
  - soc_rate_modifier_century

- title: Soil balances - carbon (SOC models)
  desc: >
    Soil-organic-carbon turnover models sharing a common annual call contract.
    HSOC (two pools plus inert organic matter) and RothC (five pools) step
    forward in time; ICBM (two pools) and AMG (active plus stable) are
    analytical; Century (five pools) integrates an ODE. Each pulls its rate
    constants from `soc_turnover_params` and takes an annual climate modifier.
    `calculate_soc_dynamics` is the selector that dispatches to any of them and
    builds the per-model native climate modifier from supplied climate drivers.
  contents:
  - calculate_soc_dynamics
  - calculate_soc_hsoc
  - calculate_soc_rothc
  - calculate_soc_icbm
  - calculate_soc_amg
  - calculate_soc_century

- title: Soil balances - carbon (inputs)
  desc: >
    Assemble the soil carbon-input layer the turnover models consume: crop
    residue, root and applied-manure carbon per cell, crop and year in
    megagrams of carbon per hectare, plus the carbon-weighted humification
    fraction from `residue_humification`.
  contents:
  - build_soil_carbon_inputs

- title: Soil balances - carbon (historical balance)
  desc: >
    Reconstruct per-cell soil-organic-carbon stock trajectories: equilibrium
    initialisation under the earliest land-use carbon inputs, a forward march on
    yearly per-cell per-class land-use areas with a carbon-conserving
    land-use-change transfer, and the derived soil-organic-nitrogen change via
    the asymmetric soil carbon-to-nitrogen ratios.
  contents:
  - build_carbon_balance

- title: Crop NPP, BNF and coefficient tables
  desc: >
    Crop net primary production (products, residues, roots, weeds), biological
    nitrogen fixation, residue destinies, and the coefficient tables that drive
    them. Ported from afsetools, item-keyed and multi-method.
  contents:
  - whep_coef_table
  - calculate_potential_npp
  - calculate_crop_residues
  - calculate_crop_roots
  - calculate_crop_npp
  - calculate_npp_carbon_nitrogen
  - calculate_crop_npp_components
  - calculate_crop_bnf
  - calculate_weed_bnf
  - calculate_nonsymbiotic_bnf
  - calculate_bnf
  - summarize_bnf
  - calculate_residue_destinies
  - build_residue_feed_avail

