url: https://eduaguilera.github.io/whep

template:
  bootstrap: 5

home:
  links:
  - text: WHEP ERC project
    href: https://cordis.europa.eu/project/id/101115126
  - text: "Contribute: <i>Follow the workflow</i>"
    href: https://lbm364dl.github.io/follow-the-workflow

authors:
  European Research Council: 
    html: "<img src='https://erc.europa.eu/themes/custom/erc_theme/ERC_FAVICON.png' width=55 alt='European Research Council'>"
