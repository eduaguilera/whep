reference:
- title: Build datasets
  desc: >
    Build full datasets from raw FAOSTAT inputs. These functions
    orchestrate reading, gap-filling, historical extension,
    and balance validation.
  contents:
  - build_primary_production
  - build_commodity_balances
  - build_processing_coefs

- title: Tidy datasets
  desc: >
    Get cleaned dataframes with project related data.
- subtitle: Production
  desc: >
    Production, supply/use, and processing datasets.
  contents:
  - build_supply_use
  - get_feed_intake
  - get_primary_production
  - get_primary_residues
  - get_processing_coefs
  - get_wide_cbs
- subtitle: Trade
  desc: >
    Bilateral trade datasets.
  contents:
  - get_bilateral_trade
- subtitle: Nitrogen cycles
  desc: >
    Nitrogen inputs, outputs, production, and destinies for Spain.
  contents:
  - create_n_prov_destiny
  - create_n_soil_inputs
  - create_n_production
  - calculate_nue_crops
  - calculate_nue_livestock
  - calculate_system_nue
  - create_n_nat_destiny

- title: Download large input datasets
  desc: >
    Fetch large files from external sources and cache them.
  contents:
  - whep_read_file
  - whep_inputs
  - whep_list_file_versions

- title: Code namings
  desc: >
    Add name columns in dataframes from their codes or viceversa.
- subtitle: Polities
  contents:
  - polities
  - polities_cats
  - regions_full
  - add_area_code
  - add_area_name
- subtitle: Commodity balance sheet items
  contents:
  - items_cbs
  - items_full
  - cbs_trade_codes
  - add_item_cbs_code
  - add_item_cbs_name
- subtitle: Primary production items
  contents:
  - items_prod
  - items_prim
  - items_prod_full
  - add_item_prod_code
  - add_item_prod_name

- title: Reference tables
  desc: >
    Lookup and coefficient tables used internally across the pipeline.
  contents:
  - animals_codes
  - biomass_coefs
  - cb_processing
  - crops_eurostat
  - liv_lu_coefs
  - primary_double

- title: FAOSTAT raw data
  desc: >
    Download FAOSTAT data as is.
  contents:
  - get_faostat_data

- title: Data sources
  desc: >
    Get a tidy dataframe with the found sources for different data.
  contents:
  - expand_trade_sources
  

- title: Gap filling functions
  desc: >
    Functions to fill gaps (NA values) in time-dependent variables using different methods.
  contents:
  - fill_linear
  - fill_sum
  - fill_proxy_growth

- title: Decomposition analysis
  desc: >
    Functions for index decomposition analysis.
  contents:
  - calculate_lmdi

- title: Livestock emissions
  desc: >
    Calculate livestock GHG emissions using IPCC 2019 Tier 1 and Tier 2
    methods for enteric methane, manure methane, and manure nitrous oxide.
  contents:
  - prepare_livestock_emissions
  - calculate_livestock_emissions
  - calculate_enteric_ch4
  - calculate_manure_emissions
  - estimate_energy_demand
  - calculate_cohorts_systems
  - calculate_uncertainty_bounds

- title: Harmonization
  desc: >
    Functions to harmonize time series items according to specified mapping.
  contents:
  - harmonize_simple
  - harmonize_interpolate
